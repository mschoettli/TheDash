version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /data/thedash.db
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - thedash

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${THEDASH_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - thedash

networks:
  thedash:
    driver: bridge
