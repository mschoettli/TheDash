<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TheDash">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#080e1a"/>
    </linearGradient>
    <linearGradient id="ac" x1="35" y1="8" x2="56" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>

  <!-- 2×2 grid tiles -->
  <rect x="8"  y="8"  width="21" height="21" rx="5" fill="#1e3a52" opacity="0.75"/>
  <rect x="35" y="8"  width="21" height="21" rx="5" fill="url(#ac)"/>
  <rect x="8"  y="35" width="21" height="21" rx="5" fill="#1e3a52" opacity="0.55"/>
  <rect x="35" y="35" width="21" height="21" rx="5" fill="#1e3a52" opacity="0.35"/>

  <!-- Status dot on accent tile -->
  <circle cx="50" cy="12" r="3" fill="#34d399"/>
</svg>
